<div class="container py-4">

    <div class="row">

        <!-- Productos -->
        <div class="col-lg-8">

            <h2 class="fw-bold mb-4">
                Productos
            </h2>

            <div class="row g-4">

                @for(prod of productos; track prod.nombre){

                <div class="col-md-6 col-xl-4">

                    <div class="card border-0 shadow-sm rounded-4 h-100">

                        <img
                            [src]="prod.imagen"
                            class="card-img-top"
                            style="height:220px;object-fit:cover;">

                        <div class="card-body d-flex flex-column">

                            <h5 class="fw-bold">
                                {{prod.nombre}}
                            </h5>

                            <p class="text-secondary small flex-grow-1">
                                {{prod.descripcion}}
                            </p>

                            <div class="d-flex justify-content-between align-items-center mb-3">

                                <span class="fs-4 fw-bold text-success">
                                    Bs {{prod.precio}}
                                </span>

                                <span class="badge bg-info">
                                    {{prod.stock}} disponibles
                                </span>

                            </div>

                            <button
                                class="btn btn-primary rounded-pill"
                                (click)="agregarCarrito(prod)">
                                <i class="bi bi-cart-plus"></i>
                                Agregar
                            </button>

                        </div>

                    </div>

                </div>

                }

            </div>

        </div>

        <!-- Carrito -->
        <div class="col-lg-4">

            <div class="card shadow border-0 rounded-4 sticky-top">

                <div class="card-header bg-primary text-white text-center py-3">

                    <h4 class="mb-0">
                        🛒 Mi Carrito
                    </h4>

                </div>

                <div class="card-body">

                    @for(item of carrito(); track item.nombre){

                    <div class="d-flex align-items-center mb-3">

                        <img
                            [src]="item.imagen"
                            class="rounded"
                            width="60"
                            height="60"
                            style="object-fit:cover;">

                        <div class="ms-3 flex-grow-1">

                            <h6 class="mb-0">
                                {{item.nombre}}
                            </h6>

                            <small class="text-muted">
                                Cantidad: {{item.cantidad}}
                            </small>

                        </div>

                        <strong class="text-success">
                            Bs {{item.precio}}
                        </strong>

                    </div>

                    <hr>

                    }

                    <div class="d-flex justify-content-between fs-5 fw-bold">

                        <span>Total</span>

                        <span class="text-success">
                            Bs {{total()}}
                        </span>

                    </div>

                    <button class="btn btn-success w-100 mt-4 rounded-pill">
                        Finalizar compra
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
