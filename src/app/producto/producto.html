<div class="container mt-4">

    <h1 class="text-center text-primary mb-4">Lista de Productos</h1>

    <!-- Formulario -->
    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
            Registrar Producto
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" [(ngModel)]="nombre">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" [(ngModel)]="precio">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" class="form-control" [(ngModel)]="stock">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Imagen (URL)</label>
                    <input type="text" class="form-control" [(ngModel)]="imagen">
                </div>

                <div class="col-12 mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" rows="3" [(ngModel)]="descripcion"></textarea>
                </div>

            </div>

            <button class="btn btn-success" (click)="funGuardar()">
                Guardar
            </button>

        </div>
    </div>

    <!-- Tabla -->
    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            Productos Registrados
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-primary">
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Imagen</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    @for (prod of productos; track $index) {

                    <tr>

                        <td>{{ prod.nombre }}</td>

                        <td>Bs. {{ prod.precio }}</td>

                        <td>{{ prod.stock }}</td>

                        <td>
                            <img
                                [src]="prod.imagen"
                                class="img-thumbnail"
                                width="100">
                        </td>

                        <td>

                            <button
                                class="btn btn-warning btn-sm me-2"
                                (click)="funEditar(prod, $index)">
                                Editar
                            </button>

                            <button
                                class="btn btn-danger btn-sm"
                                (click)="funEliminar($index)">
                                Eliminar
                            </button>

                        </td>

                    </tr>

                    }

                </tbody>

            </table>

        </div>

    </div>

</div>
